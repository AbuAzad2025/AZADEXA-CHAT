name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgresql://zestchat:zestchat@localhost:5432/zestchat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.4.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @zestchat/api run db:generate

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

      - name: Unit and integration tests
        run: pnpm run test

      - name: Critical web smoke test
        run: pnpm run test:e2e

  containers:
    name: Container Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DB_PASSWORD: ci-database-password
      JWT_SECRET: ci-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build API image
        run: docker build --target runtime --tag zestchat-api:ci --file apps/api/Dockerfile .

      - name: Build web image
        run: docker build --target runtime --tag zestchat-web:ci --file apps/web/Dockerfile .
